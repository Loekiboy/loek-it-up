        /* Globale stijlen voor de pagina en elementen */

        /* Standaard Tailwind kleuren aanpassen */
        :root {
            --primary-color: #0070c0; /* Een diep blauw */
            --secondary-color: #f7f9fb; /* Lichtgrijze achtergrond */
            --success-color: #10b981; /* Groen */
            --error-color: #ef4444; /* Rood */
            --text-color: #1f2937; /* Donkergrijs */
        }

        .bg-primary { background-color: var(--primary-color); }
        .bg-secondary { background-color: var(--secondary-color); }
        .text-primary { color: var(--primary-color); }
        .border-success { border-color: var(--success-color) !important; }
        .border-error { border-color: var(--error-color) !important; }
        
        /* Stijl voor antwoord feedback (letter-voor-letter animatie) */
        #explanation-text .char {

            transform: translateY(10px);
            transition: opacity 0.05s ease-out, transform 0.05s ease-out;

        /* --- CURSOR STIJLEN (De precieze CSS van de React Component) --- */
        .target-cursor-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            pointer-events: none;
            z-index: 9999;
            /* mix-blend-mode: difference zorgt ervoor dat de witte cursor zichtbaar is op elke achtergrond */
            mix-blend-mode: difference; 
            transform: translate(-50%, -50%);
            /* Verberg de cursor initieel totdat muisbeweging start */
            opacity: 0; 
        }

        .target-cursor-dot {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            will-change: transform;
        }

        .target-cursor-corner {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 12px;
            height: 12px;
            border: 3px solid #fff;
            will-change: transform;
        }

        .corner-tl { transform: translate(-150%, -150%); border-right: none; border-bottom: none; }
        .corner-tr { transform: translate(50%, -150%); border-left: none; border-bottom: none; }
        .corner-br { transform: translate(50%, 50%); border-left: none; border-top: none; }
        .corner-bl { transform: translate(-150%, 50%); border-right: none; border-top: none; }

        /* Verberg standaard cursor op interactieve elementen en de body */
        body, .cursor-target { 
            cursor: none !important; 
        }

        /* Dwing de standaard cursor af als de input actief is */
        #answer-input:focus {

        // Shuffle array in-place
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }

        // Text Scrambler Klasse (voor het leuke effect bij nieuwe zinnen)
        class TextScrambler {
            constructor(element) {
                this.element = element;
                this.originalText = element.textContent;
                this.chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{};\':"\\|,./<>?';
                this.frame = 0;
                this.update = this.update.bind(this);
            }

            scramble(newText) {
                this.originalText = newText;
                this.frame = 0;
                this.queue = [];
                for (let i = 0; i < this.originalText.length; i++) {
                    const from = this.element.textContent[i] || '';
                    const to = this.originalText[i];
                    const start = Math.floor(Math.random() * 40); // Startvertraging
                    const end = start + Math.floor(Math.random() * 40); // Einde van scrambling
                    this.queue.push({ from, to, start, end });
                }
                cancelAnimationFrame(this.frameRequest);
                this.frameRequest = requestAnimationFrame(this.update);
            }

            update(time) {
                let output = '';
                let complete = 0;
                this.frame++;

                for (let i = 0, n = this.queue.length; i < n; i++) {
                    let { from, to, start, end } = this.queue[i];

                    if (this.frame >= end) {
                        complete++;
                        output += to;
                    } else if (this.frame >= start) {
                        // Scramble fase
                        if (to !== ' ') {
                            output += this.chars[Math.floor(Math.random() * this.chars.length)];
                        } else {
                            output += ' ';
                        }
                    } else {
                        // Wachtfase
                        output += from;
                    }
                }

                this.element.textContent = output;

                if (complete !== this.queue.length) {
                    this.frameRequest = requestAnimationFrame(this.update);
                }
            }
        }

            document.getElementById('check-button').disabled = false;

            document.getElementById('next-button').disabled = true;
            document.getElementById('next-button').classList.add('opacity-50');

            inputEl.focus();

            // Toon de NL hint ZONDER de uitleg
            nlContextEl.textContent = `NL Persoons-vnw: ${q.nl_pronoun}`;

            // Activeer de scrambler. We tonen nu de kale vraag met '___'.
            scramblerInstance.scramble(q.sentence); 
        }

        function checkAnswer() {
            const q = getQuestion();
            if (!q) return;

            const inputEl = document.getElementById('answer-input');
            const answer = inputEl.value.trim().toLowerCase();
            const correctAnswers = Array.isArray(q.correct) ? q.correct.map(a => a.toLowerCase()) : [q.correct.toLowerCase()];
            const isCorrect = correctAnswers.includes(answer);
            
            // Laat de ingevulde juiste zin zien (met scrambler)
            scramblerInstance.scramble(q.sentence.replace('___', q.correct));


            document.getElementById('check-button').disabled = true;
            document.getElementById('check-button').classList.add('opacity-50');
            document.getElementById('next-button').disabled = false;
            document.getElementById('next-button').classList.remove('opacity-50');
            
            // Verlies focus zodat de custom cursor weer verschijnt als men niet typt
            inputEl.blur();

            if (isCorrect) {
                // Succes: Groene rand
                inputEl.classList.add('border-success');
                inputEl.classList.remove('border-error', 'border-gray-300');
                
                // Toon de Nederlandse vertaling en beknopte feedback
                showExplanation(`Juist! De zin betekent: ${q.translation}`, true);
                score++;
                // Animatie voor de score
                gsap.to('#score-display', { scale: 1.2, duration: 0.1, yoyo: true, repeat: 1, onComplete: updateScoreDisplay });
                
                // Activeer Confetti/Star Overlay
                activateStarOverlay(true);
            } else {
                // Fout: Rode rand en screenshake
                inputEl.classList.add('border-error');
                inputEl.classList.remove('border-success', 'border-gray-300');

                // Toon de juiste vorm én de volledige reden (Naamval en uitleg)
                showExplanation(`Fout. De juiste vorm is "${q.correct}". Uitleg: ${q.reason}`, false);
                activateStarOverlay(false); // Sterren overlay uit voor foute antwoorden
                triggerScreenshake(); // SCHUDDEN BIJ FOUT ANTWOORD
            }
        }

        function nextQuestion() {
            currentQuestionIndex = (currentQuestionIndex + 1) % questions.length;
            loadQuestion();
        }

        // Functie voor Enter-besturing
        function handleEnterKey(event) {
            if (event.key === 'Enter') {
                const checkButton = document.getElementById('check-button');
                const nextButton = document.getElementById('next-button');
                
                if (!checkButton.disabled) {
                    // Check button is actief
                    checkAnswer();
                } else if (!nextButton.disabled) {
                    // Next button is actief
                    nextQuestion();
                }
            }
        }

        function showExplanation(text, isCorrect) {
            const explanationEl = document.getElementById('explanation-text');
            explanationEl.innerHTML = ''; // Maak leeg
            explanationEl.classList.remove('text-success', 'text-error');
            explanationEl.classList.add(isCorrect ? 'text-success' : 'text-error');

            // Verdeel de tekst in karakters
            const characters = text.split('');
            characters.forEach((char, index) => {
                const span = document.createElement('span');
                span.textContent = char;
                span.classList.add('char');
                explanationEl.appendChild(span);
            });

            // Activeer de animatie voor de karakters
            requestAnimationFrame(() => {
                explanationEl.classList.add('visible');
                explanationEl.querySelectorAll('.char').forEach((charEl, index) => {
                    charEl.style.transitionDelay = `${index * 0.02}s`;
                });
            });
        }

        function updateScoreDisplay() {
            document.getElementById('score-display').textContent = `Score: ${score}`;
        }

        function populatePronounTable() {
            const tbody = document.getElementById('pronoun-table-body');
            tbody.innerHTML = ''; // Maak leeg

            pronounTableData.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-4 py-2 font-bold bg-gray-50 text-text-color border border-gray-200">${row.case}</td>
                    <td class="px-4 py-2 border border-gray-200">${row.ich}</td>
                    <td class="px-4 py-2 border border-gray-200">${row.du}</td>
                    <td class="px-4 py-2 border border-gray-200">${row.er}</td>
                    <td class="px-4 py-2 border border-gray-200">${row.sie}</td>
                    <td class="px-4 py-2 border border-gray-200">${row.es}</td>
                    <td class="px-4 py-2 border border-gray-200">${row.wir}</td>
                    <td class="px-4 py-2 border border-gray-200">${row.ihr}</td>
                    <td class="px-4 py-2 border border-gray-200">${row.sie_Sie}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function togglePronounTable() {
            const tableContainer = document.getElementById('pronoun-table-container');
            const button = document.getElementById('toggle-table-button');
            const isHidden = tableContainer.classList.contains('hidden');

            if (isHidden) {
                gsap.fromTo(tableContainer, 
                    { opacity: 0, height: 0, scaleY: 0.8 }, 
                    { opacity: 1, height: 'auto', scaleY: 1, duration: 0.4, ease: "power2.out", onStart: () => tableContainer.classList.remove('hidden') }
                );
                button.textContent = 'Verberg Hulptabel';
            } else {
                gsap.to(tableContainer, 
                    { opacity: 0, height: 0, scaleY: 0.8, duration: 0.3, ease: "power2.in", onComplete: () => tableContainer.classList.add('hidden') }
                );
                button.textContent = 'Toon Hulptabel (Personalia)';
            }
        }

        // Functie voor de sterren overlay animatie
        function activateStarOverlay(isSuccess) {
            const overlay = document.getElementById('star-overlay');
            overlay.innerHTML = ''; 
            
            if (!isSuccess) return;

            const color = isSuccess ? '#ffc700' : '#0070c0'; // Goud/Geel voor succes
            const starCount = isSuccess ? 15 : 5;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.style.position = 'absolute';
                star.style.width = '8px';
                star.style.height = '8px';
                star.style.backgroundColor = color;
                star.style.clipPath = 'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)';
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.opacity = 0;
                overlay.appendChild(star);

                gsap.fromTo(star, 
                    { y: 0, opacity: 1, scale: 0.5, rotation: Math.random() * 360 }, 
                    { 
                        y: Math.random() * 200 - 100, // vertical move
                        x: Math.random() * 200 - 100, // horizontal move
                        opacity: 0, 
                        scale: 1.5,
                        duration: 1.5 + Math.random() * 1,
                        ease: "power2.out",
                        onComplete: () => star.remove()
                    }
                );
            }
        }

        // Aangepaste functie: Screenshake op de input box
        function triggerScreenshake() {
            const inputEl = document.getElementById('answer-input');
            if (inputEl) {
                // Gebruik de input zelf als target voor de schud-animatie
                gsap.to(inputEl, {
                    x: 4, // Horizontale shake (iets kleiner voor de input)
                    duration: 0.05,
                    ease: "power1.inOut",
                    repeat: 5, // Meer herhalingen voor een duidelijk effect
                    yoyo: true, 
                    clearProps: "x" // Reset de positie na de animatie
                });
            }
        }
        
        // -------------------------------------------------------------
        // DE COMPLEXE CURSOR LOGICA (Van React naar Vanilla JS met GSAP)
        // -------------------------------------------------------------

        function initTargetCursor() {
            // Constanten uit de React code
            const targetSelector = '.cursor-target';
            const spinDuration = 2;
            const constants = {
                borderWidth: 3,
                cornerSize: 12,
                parallaxStrength: 0.00005
            };

            // Elementen selecteren
            const cursor = document.getElementById('custom-cursor-wrapper');
            const dot = document.getElementById('cursor-dot');
            const corners = document.querySelectorAll('.target-cursor-corner');

            // Status variabelen (vervangt useRef/useState)
            let activeTarget = null;
            let currentTargetMove = null;
            let currentLeaveHandler = null;
            let isAnimatingToTarget = false;
            let resumeTimeout = null;
            let spinTl = null;
            let isCursorHidden = false; // Nieuwe status

            // Functie om cursor te tonen/verbergen
            const toggleCursorVisibility = (visible) => {
                if (!cursor) return;
                isCursorHidden = !visible;
                gsap.to(cursor, { opacity: visible ? 1 : 0, duration: 0.3 });
            };

            // 1. Cursor Verplaatsing (Vervangt moveCursor useCallback)
            const moveCursor = (x, y) => {
                if (!cursor) return;
                gsap.to(cursor, {
                    x,
                    y,
                    duration: 0.1,
                    ease: 'power3.out'
                });
                 // Zorg ervoor dat de cursor zichtbaar is na de eerste beweging (als niet verborgen door input)
                if (!isCursorHidden) {
                    gsap.to(cursor, { opacity: 1, duration: 0.3 });
                }
            };

            // 2. Tijdlijn voor Rotatie (Vervangt createSpinTimeline)
            const createSpinTimeline = () => {
                if (spinTl) {
                    spinTl.kill();
                }
                spinTl = gsap
                    .timeline({ repeat: -1 })
                    .to(cursor, { rotation: '+=360', duration: spinDuration, ease: 'none' });
            };

            // Initialiseer de spin
            createSpinTimeline();

            // Initiele positionering (zoals in React's useEffect)
            gsap.set(cursor, {
                xPercent: -50,
                yPercent: -50,
                x: window.innerWidth / 2,
                y: window.innerHeight / 2
            });

            // 3. Update Hoeken Functie (Kernlogica voor target hover)
            const updateCorners = (mouseX, mouseY, target) => {
                if (!target || !cursor) return;
                
                const rect = target.getBoundingClientRect();
                const cursorRect = cursor.getBoundingClientRect();

                const cursorCenterX = cursorRect.left + cursorRect.width / 2;
                const cursorCenterY = cursorRect.top + cursorRect.height / 2;

                const [tlc, trc, brc, blc] = Array.from(corners);

                const { borderWidth, cornerSize, parallaxStrength } = constants;

                // Bereken de basis offset om de hoeken op de target te plaatsen
                let tlOffset = {
                    x: rect.left - cursorCenterX - borderWidth,
                    y: rect.top - cursorCenterY - borderWidth
                };
                let trOffset = {
                    x: rect.right - cursorCenterX + borderWidth - cornerSize,
                    y: rect.top - cursorCenterY - borderWidth
                };
                let brOffset = {
                    x: rect.right - cursorCenterX + borderWidth - cornerSize,
                    y: rect.bottom - cursorCenterY + borderWidth - cornerSize
                };
                let blOffset = {
                    x: rect.left - cursorCenterX - borderWidth,
                    y: rect.bottom - cursorCenterY + borderWidth - cornerSize
                };
                
                // Parallax berekening (als muispositie is gegeven)
                if (mouseX !== undefined && mouseY !== undefined) {
                    const targetCenterX = rect.left + rect.width / 2;
                    const targetCenterY = rect.top + rect.height / 2;
                    const mouseOffsetX = (mouseX - targetCenterX) * parallaxStrength * 1000; // Vermeerderd voor zichtbaar effect
                    const mouseOffsetY = (mouseY - targetCenterY) * parallaxStrength * 1000;

                    tlOffset.x += mouseOffsetX; tlOffset.y += mouseOffsetY;
                    trOffset.x += mouseOffsetX; trOffset.y += mouseOffsetY;
                    brOffset.x += mouseOffsetX; brOffset.y += mouseOffsetY;
                    blOffset.x += mouseOffsetX; blOffset.y += mouseOffsetY;
                }

                const tl = gsap.timeline();
                const cornersArray = [tlc, trc, brc, blc];
                const offsets = [tlOffset, trOffset, brOffset, blOffset];

                cornersArray.forEach((corner, index) => {
                    tl.to(
                        corner,
                        {
                            x: offsets[index].x,
                            y: offsets[index].y,
                            duration: 0.2,
                            ease: 'power2.out'
                        },
                        0
                    );
                });
            };
            
            // 4. Cleanup Functie
            const cleanupTarget = target => {
                if (currentTargetMove) {
                    target.removeEventListener('mousemove', currentTargetMove);
                }
                if (currentLeaveHandler) {
                    target.removeEventListener('mouseleave', currentLeaveHandler);
                }
                currentTargetMove = null;
                currentLeaveHandler = null;
            };

            // 5. Leave Handler (Van target naar idle)
            const handleLeave = (target) => () => {
                activeTarget = null;
                isAnimatingToTarget = false;

                if (corners) {
                    // Stuur de hoeken terug naar hun oorspronkelijke positie
                    const positions = [
                        { x: -constants.cornerSize * 1.5, y: -constants.cornerSize * 1.5 },
                        { x: constants.cornerSize * 0.5, y: -constants.cornerSize * 1.5 },
                        { x: constants.cornerSize * 0.5, y: constants.cornerSize * 0.5 },
                        { x: -constants.cornerSize * 1.5, y: constants.cornerSize * 0.5 }
                    ];

                    const tl = gsap.timeline();
                    Array.from(corners).forEach((corner, index) => {
                        gsap.killTweensOf(corner);
                        tl.to(
                            corner,
                            {
                                x: positions[index].x,
                                y: positions[index].y,
                                duration: 0.3,
                                ease: 'power3.out'
                            },
                            0
                        );
                    });
                }

                // Hervat de rotatie na een korte vertraging
                resumeTimeout = setTimeout(() => {
                    if (!activeTarget && cursor && spinTl) {
                        const currentRotation = gsap.getProperty(cursor, 'rotation');
                        const normalizedRotation = currentRotation % 360;

                        spinTl.kill(); // Dood de oude eindeloze timeline
                        
                        // Zorg voor een soepele overgang naar de continue rotatie
                        gsap.to(cursor, {
                            rotation: normalizedRotation + 360,
                            duration: spinDuration * (1 - normalizedRotation / 360),
                            ease: 'none',
                            onComplete: () => {
                                // Start de eindeloze spin opnieuw
                                spinTl = gsap.timeline({ repeat: -1 })
                                    .to(cursor, { rotation: '+=360', duration: spinDuration, ease: 'none' });
                            }
                        });
                    }
                    resumeTimeout = null;
                }, 50);

                cleanupTarget(target);
            };

            // 6. Enter Handler (De hoofd event listener)
            const enterHandler = e => {
                // Gebruik .closest om het werkelijke target (de button/input) te vinden
                const target = e.target.closest(targetSelector);
                if (!target || activeTarget === target) return;

                if (activeTarget) {
                    // Verlaat het vorige actieve target
                    if (currentLeaveHandler) {
                        currentLeaveHandler();
                    }
                    cleanupTarget(activeTarget);
                }

                if (resumeTimeout) {
                    clearTimeout(resumeTimeout);
                    resumeTimeout = null;
                }

                activeTarget = target;
                
                // Stop de rotatie en reset naar 0
                gsap.killTweensOf(cursor, 'rotation');
                if (spinTl) spinTl.pause();
                gsap.set(cursor, { rotation: 0 });

                // Vlieg de hoeken naar de startpositie
                isAnimatingToTarget = true;
                updateCorners(e.clientX, e.clientY, target);

                setTimeout(() => {
                    isAnimatingToTarget = false;
                }, 200); // 200ms is de duur van de updateCorners animatie

                // Throttle de mousemove voor parallax update
                let moveThrottle = null;
                const targetMove = ev => {
                    if (moveThrottle || isAnimatingToTarget) return;
                    moveThrottle = requestAnimationFrame(() => {
                        updateCorners(ev.clientX, ev.clientY, target);
                        moveThrottle = null;
                    });
                };

                const leaveHandler = handleLeave(target);

                currentTargetMove = targetMove;
                currentLeaveHandler = leaveHandler;

                target.addEventListener('mousemove', targetMove);
                target.addEventListener('mouseleave', leaveHandler);
            };
            
            // 7. Klik animatie
            const mouseDownHandler = () => {
                if (!dot) return;
                gsap.to(dot, { scale: 0.7, duration: 0.3 });
                gsap.to(cursor, { scale: 0.9, duration: 0.2 });
            };

            const mouseUpHandler = () => {
                if (!dot) return;
                gsap.to(dot, { scale: 1, duration: 0.3 });
                gsap.to(cursor, { scale: 1, duration: 0.2 });
            };

            // Input Focus en Blur Handlers (om custom cursor te verbergen/tonen)
            const inputFocusHandler = () => {
                toggleCursorVisibility(false); // Verberg custom cursor
            };

            const inputBlurHandler = () => {
                if (!activeTarget) {
                    toggleCursorVisibility(true); // Toon custom cursor als er geen ander target is
                }
            };


            // Globale listeners
            const moveHandler = e => moveCursor(e.clientX, e.clientY);
            window.addEventListener('mousemove', moveHandler);
            window.addEventListener('mouseover', enterHandler); // Gebruik over, niet mouseenter
            window.addEventListener('mousedown', mouseDownHandler);
            window.addEventListener('mouseup', mouseUpHandler);
            
            // Listener voor Enter-besturing
            document.addEventListener('keydown', handleEnterKey);


            // Cleanup bij verlaten van het venster
            document.addEventListener('mouseleave', () => {
                gsap.to(cursor, { opacity: 0, duration: 0.3 });
            });
            
            // Attach input handlers
            const inputEl = document.getElementById('answer-input');
            if (inputEl) {
                inputEl.addEventListener('focus', inputFocusHandler);
                inputEl.addEventListener('blur', inputBlurHandler);
            }
        }
        
        // Initialiseer de game bij het laden van de pagina
        window.onload = function() {
            // ... (Bestaande app initialisatie)
            populatePronounTable();
            shuffleArray(questions);
            // Zorg ervoor dat de elementen bestaan voordat scramblerInstance wordt gemaakt
            if (document.getElementById('german-sentence')) {
                scramblerInstance = new TextScrambler(document.getElementById('german-sentence'));
            } else {
                // Valback voor het geval de HTML structuur nog niet 100% geladen is
                console.error("Duitse zins-element niet gevonden.");
                // Zorg ervoor dat we de init doorzetten, essentieel voor de cursor
            }
            loadQuestion();
            updateScoreDisplay(); // Initialiseer score display
            
            // -----------------------------------------------------------------
            // START DE COMPLEXE CUSTOM CURSOR
            // -----------------------------------------------------------------
            initTargetCursor();
        };

    </script>
