            const handleNext = React.useCallback(() => {
                setIsFlipped(false);
                setSlideDirection('right');
                setAnimKey(prev => prev + 1);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev + 1) % flashcardsData.length);
                }, 100);
            }, []);

            const handlePrev = React.useCallback(() => {
                setIsFlipped(false);
                setSlideDirection('left');
                setAnimKey(prev => prev + 1);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev - 1 + flashcardsData.length) % flashcardsData.length);
                }, 100);
            }, []);

            // Keyboard navigation listener
            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight') {
                        handleNext();
                    } else if (e.key === 'ArrowLeft') {
                        handlePrev();
                    } else if (e.key === ' ' || e.key === 'Enter') {
                        e.preventDefault();
                        setIsFlipped(prev => !prev);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);

                        ) : (
                            /* PRACHTIG CONFETTI EN SUCCESS SCHERM */
                            <div className="py-8 space-y-6 animate-fade-in">
                                {/* Header met score */}
                                <div className="text-center space-y-4">
                                    <div className="inline-flex p-4 bg-green-50 text-green-600 rounded-full border border-green-100 mb-2">
                                        <i data-lucide="party-popper" className="w-12 h-12"></i>
                                    </div>
                                    
                                    <div>
                                        <h3 className="text-3xl font-black text-slate-900 tracking-tight">Gefeliciteerd! 🎉</h3>
                                        <p className="text-slate-500 text-sm mt-1">Je hebt de Duitse Konjunktiv Toets afgerond.</p>
                                    </div>

                                    {/* Score board */}
                                    <div className="bg-slate-50 border border-slate-100 p-6 rounded-2xl grid grid-cols-2 gap-4 divide-x divide-slate-200 max-w-md mx-auto">
                                        <div>
                                            <span className="text-xs font-bold text-slate-400 uppercase tracking-wider block">Jouw Cijfer</span>
                                            <span className={`text-4xl font-black block mt-1 ${parseFloat(getCijfer()) >= 5.5 ? 'text-green-600' : 'text-red-500'}`}>
                                                {getCijfer()}
                                            </span>
                                        </div>
                                        <div>
                                            <span className="text-xs font-bold text-slate-400 uppercase tracking-wider block">Goede Antwoorden</span>
                                            <span className="text-4xl font-black text-slate-800 block mt-1">
                                                {getScore()} / {selectedQuestions.length}
                                            </span>
                                        </div>
                                    </div>

                                    {/* Feedback zin */}
                                    <p className="text-slate-600 text-sm leading-relaxed px-4">
                                        {parseFloat(getCijfer()) >= 8.0 
                                            ? "Sensationell! Je kent de Konjunktiv als een echte Duitse native speaker! 🚀" 
                                            : parseFloat(getCijfer()) >= 5.5 
                                                ? "Prima gedaan! Je bent geslaagd en snapt de regels uitstekend. 👍" 
                                                : "Nog even oefenen! Bekijk de theorie nog eens goed en let op de uitzonderingen van 'hebben' en 'zijn'. 🇩🇪"}
                                    </p>
                                </div>

                                {/* Antwoorden Review */}
                                <div className="border-t border-slate-100 pt-6">
                                    <h4 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                        <i data-lucide="list-checks" className="w-5 h-5"></i>
                                        Jouw Antwoorden
                                    </h4>
                                    
                                    <div className="space-y-3 max-h-96 overflow-y-auto">
                                        {selectedQuestions.map((q, idx) => {
                                            const userAnswer = (userInputs[q.id] || '').trim().toLowerCase();
                                            const isCorrect = userAnswer === q.correct.toLowerCase();
                                            
                                            return (
                                                <div 
                                                    key={q.id} 
                                                    className={`p-4 rounded-xl border-2 transition-all ${
                                                        isCorrect 
                                                            ? 'bg-green-50 border-green-200' 
                                                            : 'bg-red-50 border-red-200'
                                                    }`}
                                                >
                                                    <div className="flex items-start gap-3">
                                                        <div className={`flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center font-bold text-sm ${
                                                            isCorrect 
                                                                ? 'bg-green-500 text-white' 
                                                                : 'bg-red-500 text-white'
                                                        }`}>
                                                            {isCorrect ? '✓' : '✗'}
                                                        </div>
                                                        
                                                        <div className="flex-1 min-w-0">
                                                            <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">
                                                                Vraag {idx + 1}
                                                            </p>
                                                            
                                                            <p className="text-sm text-slate-700 leading-relaxed mb-3">
                                                                <span>{q.before}</span>
                                                                <span className={`font-bold mx-1 ${isCorrect ? 'text-green-600' : 'text-red-600'}`}>
                                                                    {userAnswer || '(leeg)'}
                                                                </span>
                                                                <span>{q.after}</span>
                                                            </p>
                                                            
                                                            {!isCorrect && (
                                                                <div className="bg-white rounded-lg p-3 border border-red-100 mt-2">
                                                                    <p className="text-xs text-slate-600 mb-1">
                                                                        <span className="font-bold text-slate-800">Juiste antwoord:</span>
                                                                    </p>
                                                                    <p className="text-sm font-bold text-green-700">
                                                                        {q.correct}
                                                                    </p>
                                                                    <p className="text-xs text-slate-600 mt-2 italic">
                                                                        💡 {q.hint}
                                                                    </p>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Grote Actieknoppen */}
                                <div className="flex flex-col gap-3 pt-6 border-t border-slate-100">
                                    <a 
                                        href="https://loek.oerlemans.tv/loek-it-up/"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="w-full px-6 py-4 bg-[#fdc204] hover:bg-[#e8b200] text-slate-900 border-2 border-slate-900 border-b-4 active:border-b-2 active:translate-y-[2px] font-extrabold rounded-xl text-sm transition-all shadow-md flex items-center justify-center gap-3 animate-bounce"
                                    >
                                        <img src="../../images/logo.svg" alt="Loek-It-Up Logo" className="w-7 h-7 drop-shadow-sm" />
                                        <span>Oefen je woordjes sneller met Loek-it-up! 🚀</span>
                                    </a>

                                    <a 
                                        href="../index.html"
                                        className="w-full px-6 py-3.5 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl text-xs transition-all flex items-center justify-center shadow-md gap-2"
                                    >
                                        <i data-lucide="arrow-left" className="w-4 h-4"></i> Terug naar Duits Portaal
                                    </a>

                                    <button 
                                        onClick={initializeQuizQuestions}
                                        className="w-full px-6 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl text-xs transition-all flex items-center justify-center"
                                    >
                                        <i data-lucide="rotate-ccw" className="w-4 h-4 mr-2"></i> Nieuwe Toets (Andere Zinnen!)
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = React.useState('uitleg'); 
            const [nextTabCandidate, setNextTabCandidate] = React.useState(null); 
            const [isWarningOpen, setIsWarningOpen] = React.useState(false);

            // Trigger Lucide icons bij elke verandering
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, isWarningOpen]);

            // Controleert of een tab-wissel of sluitactie is toegestaan
            const requestTabChange = (targetTab) => {
                const isCurrentlyActiveGame = ['kaarten', 'koppelen', 'quiz'].includes(activeTab);
                const isGoingToDifferentTab = targetTab !== activeTab;

                if (isCurrentlyActiveGame && isGoingToDifferentTab) {
                    setNextTabCandidate(targetTab);
                    setIsWarningOpen(true);
                } else {
                    setActiveTab(targetTab);
                }
            };

            const confirmExit = () => {
                setIsWarningOpen(false);
                if (nextTabCandidate) {
                    setActiveTab(nextTabCandidate);
                    setNextTabCandidate(null);
                } else {
                    setActiveTab('uitleg');
                }
            };

            const cancelExit = () => {
                setIsWarningOpen(false);
                setNextTabCandidate(null);
            };

            return (
                <div className="min-h-screen pb-20 bg-slate-50">
                    
                    {/* Duitse vlag streep */}
                    <div className="h-1.5 w-full flex">
                        <div className="flex-1 bg-black"></div>
                        <div className="flex-1 bg-red-600"></div>
                        <div className="flex-1 bg-amber-500"></div>
                    </div>

                    {/* Jumbotron */}
                    <header className="bg-slate-900 text-white py-12 px-4 shadow-lg text-center relative overflow-hidden">
                        <div className="max-w-4xl mx-auto relative z-10">
                            <span className="inline-flex items-center gap-1 bg-amber-500/20 border border-amber-400/30 text-amber-300 text-[10px] px-3 py-1 rounded-full font-extrabold uppercase tracking-widest mb-3">
                                🇩🇪 TB K16 MASTER PORTAAL
                            </span>
                            <h1 className="text-3xl md:text-5xl font-black mb-2 tracking-tight">Duitse Konjunktiv Master</h1>
                            <p className="text-slate-300 text-sm md:text-base max-w-xl mx-auto font-light leading-relaxed">
                                Nu met 80 unieke oefensituaties, soepele swipe-animaties en de direct gekoppelde woordjes-app.
                            </p>
                        </div>
                    </header>

                    {/* Hoofd Navigatie & Canvas Area */}
                    <main className="max-w-4xl mx-auto px-2 sm:px-4 -mt-6 relative z-20">
                        
                        {/* Tabs Navigation */}
                        <div className="bg-white rounded-xl p-1.5 shadow-md border border-slate-100 flex flex-wrap gap-1 mb-6">
                            <button 
                                onClick={() => requestTabChange('uitleg')}
                                className={`flex-1 min-w-[120px] py-3 px-3 rounded-lg font-bold text-xs flex items-center justify-center transition-all
                                    ${activeTab === 'uitleg' 
                                        ? 'bg-blue-600 text-white shadow-sm' 
                                        : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'}`}
                            >
                                <i data-lucide="book-open" className="w-3.5 h-3.5 mr-1.5"></i>
                                <span>Theorie & Regels</span>
                            </button>
                            
                            <button 
                                onClick={() => requestTabChange('kaarten')}
                                className={`flex-1 min-w-[120px] py-3 px-3 rounded-lg font-bold text-xs flex items-center justify-center transition-all
                                    ${activeTab === 'kaarten' 
                                        ? 'bg-blue-600 text-white shadow-sm' 
                                        : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'}`}
                            >
                                <i data-lucide="layers" className="w-3.5 h-3.5 mr-1.5"></i>
                                <span>Flitskaarten</span>
                            </button>

                            <button 
                                onClick={() => requestTabChange('koppelen')}
                                className={`flex-1 min-w-[120px] py-3 px-3 rounded-lg font-bold text-xs flex items-center justify-center transition-all
                                    ${activeTab === 'koppelen' 
                                        ? 'bg-blue-600 text-white shadow-sm' 
                                        : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'}`}
                            >
                                <i data-lucide="git-commit" className="w-3.5 h-3.5 mr-1.5"></i>
                                <span>Koppelaar</span>
                            </button>

                            <button 
                                onClick={() => requestTabChange('quiz')}
                                className={`flex-1 min-w-[120px] py-3 px-3 rounded-lg font-bold text-xs flex items-center justify-center transition-all
                                    ${activeTab === 'quiz' 
                                        ? 'bg-blue-600 text-white shadow-sm' 
                                        : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'}`}
                            >
                                <i data-lucide="award" className="w-3.5 h-3.5 mr-1.5"></i>
                                <span>Eindquiz</span>
                            </button>
                        </div>

                        {/* Actieve Sectie */}
                        <div className="min-h-[400px]">
                            {activeTab === 'uitleg' && <TheoryTab />}
                            {activeTab === 'kaarten' && <FlashcardSection onExitRequest={() => requestTabChange('uitleg')} />}
                            {activeTab === 'koppelen' && <MatchGame onExitRequest={() => requestTabChange('uitleg')} />}
                            {activeTab === 'quiz' && <QuizSection onExitRequest={() => requestTabChange('uitleg')} />}
                        </div>
                    </main>

                    {/* Pop-up Waarschuwing */}
                    <WarningModal 
                        isOpen={isWarningOpen}
                        onConfirm={confirmExit}
                        onCancel={cancelExit}
                    />

                    {/* Footer */}
                    <footer className="mt-20 text-center text-slate-400 text-xs py-6 border-t border-slate-200">
                        <p className="font-semibold text-slate-500 mb-1">Duitse Konjunktiv Portal</p>
                        <p>Inhoud gebaseerd op: Seite 18 / 19 TB K16 🇩🇪</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        /* Fade-in animaties */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.25s ease-out forwards;
        }
    </style>
</body>
</html>
