name: loek_it_up
description: Gratis woordjes leren app. Maak je eigen woordenlijsten en oefen met meerdere modi.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.1.1

  # Database & Storage
  supabase_flutter: ^2.3.4
  shared_preferences: ^2.2.2

  # Audio
  audioplayers: ^5.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  confetti: ^0.7.0

  # Routing
  go_router: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/fonts/

  fonts:
    - family: FontAwesome
      fonts:
        - asset: assets/fonts/fontawesome/webfonts/fa-solid-900.ttf
        - asset: assets/fonts/fontawesome/webfonts/fa-regular-400.ttf
        - asset: assets/fonts/fontawesome/webfonts/fa-brands-400.ttf
